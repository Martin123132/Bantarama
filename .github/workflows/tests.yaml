name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: windows-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      BANTARAMA_HOME: ${{ github.workspace }}\BantaramaData
      BANTARAMA_DISABLE_OPEN: "1"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m compileall house_rules_app tests scripts

      - name: Generate sample rounds
        run: python scripts\sample_rounds.py --count 2
